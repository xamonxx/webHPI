name: Auto Deploy Laravel to Hostinger Shared Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Laravel via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hostinger Shared Hosting
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          command_timeout: 30m
          script: |
            set -e

            echo "======================================"
            echo "START DEPLOYMENT"
            echo "======================================"

            DOMAIN="homeputrainterior.com"
            PROJECT_NAME="webHPI"
            BRANCH="main"
            REPO_URL="https://github.com/xamonxx/webHPI.git"

            BASE_DIR="$HOME/domains/$DOMAIN"
            PROJECT_DIR="$BASE_DIR/$PROJECT_NAME"
            PUBLIC_DIR="$BASE_DIR/public_html"

            echo "Base directory: $BASE_DIR"
            echo "Project directory: $PROJECT_DIR"
            echo "Public directory: $PUBLIC_DIR"

            mkdir -p "$BASE_DIR"

            echo "======================================"
            echo "CLONE OR UPDATE REPOSITORY"
            echo "======================================"

            if [ ! -d "$PROJECT_DIR/.git" ]; then
              echo "Project not found. Cloning repository..."
              rm -rf "$PROJECT_DIR"
              git clone -b "$BRANCH" "$REPO_URL" "$PROJECT_DIR"
            fi

            cd "$PROJECT_DIR"

            echo "Pulling latest code..."
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            echo "======================================"
            echo "CHECK ENVIRONMENT FILE"
            echo "======================================"

            if [ ! -f ".env" ]; then
              echo "Creating .env from GitHub Secrets..."

              cat > .env <<EOF
            APP_NAME="Home Putra Interior"
            APP_ENV=production
            APP_KEY=
            APP_DEBUG=false
            APP_URL=${{ secrets.PRODUCTION_APP_URL }}

            LOG_CHANNEL=stack
            LOG_LEVEL=error

            DB_CONNECTION=mysql
            DB_HOST=${{ secrets.PRODUCTION_DB_HOST }}
            DB_PORT=${{ secrets.PRODUCTION_DB_PORT }}
            DB_DATABASE=${{ secrets.PRODUCTION_DB_DATABASE }}
            DB_USERNAME=${{ secrets.PRODUCTION_DB_USERNAME }}
            DB_PASSWORD=${{ secrets.PRODUCTION_DB_PASSWORD }}

            CACHE_DRIVER=file
            SESSION_DRIVER=file
            QUEUE_CONNECTION=sync
            FILESYSTEM_DISK=public
            EOF
            fi

            echo "======================================"
            echo "INSTALL PHP DEPENDENCIES"
            echo "======================================"

            if [ -f "composer.json" ]; then
              if command -v composer >/dev/null 2>&1; then
                composer install --no-dev --optimize-autoloader
              else
                echo "Composer not found on server. Skipping composer install."
              fi
            fi

            echo "======================================"
            echo "BUILD FRONTEND ASSETS"
            echo "======================================"

            if [ -f "package.json" ]; then
              if command -v npm >/dev/null 2>&1; then
                npm ci
                npm run build
              else
                echo "NPM not found on server. Skipping frontend build."
                echo "Make sure built assets are committed or build from GitHub Actions."
              fi
            fi

            echo "======================================"
            echo "RUN LARAVEL PRODUCTION COMMANDS"
            echo "======================================"

            if [ -f "artisan" ]; then
              if grep -q "APP_KEY=$" .env || grep -q "APP_KEY=\"\"" .env; then
                php artisan key:generate --force
              fi

              php artisan migrate --force

              php artisan storage:link || true

              php artisan config:clear
              php artisan cache:clear
              php artisan route:clear
              php artisan view:clear

              php artisan config:cache
              php artisan route:cache
              php artisan view:cache
              php artisan optimize
            fi

            echo "======================================"
            echo "SYNC PUBLIC FOLDER TO PUBLIC_HTML"
            echo "======================================"

            if [ -d "$PROJECT_DIR/public" ]; then
              mkdir -p "$PUBLIC_DIR"

              rsync -av --delete \
                --exclude=".env" \
                --exclude="storage" \
                "$PROJECT_DIR/public/" "$PUBLIC_DIR/"
            else
              echo "ERROR: Laravel public folder not found."
              exit 1
            fi

            echo "======================================"
            echo "FIX PUBLIC_HTML INDEX.PHP PATH"
            echo "======================================"

            INDEX_FILE="$PUBLIC_DIR/index.php"

            if [ -f "$INDEX_FILE" ]; then
              sed -i "s|__DIR__.'/../vendor/autoload.php'|__DIR__.'/../$PROJECT_NAME/vendor/autoload.php'|g" "$INDEX_FILE" || true
              sed -i "s|__DIR__.'/../bootstrap/app.php'|__DIR__.'/../$PROJECT_NAME/bootstrap/app.php'|g" "$INDEX_FILE" || true
            else
              echo "ERROR: index.php not found in public_html."
              exit 1
            fi

            echo "======================================"
            echo "SET PERMISSIONS"
            echo "======================================"

            chmod -R 775 "$PROJECT_DIR/storage" || true
            chmod -R 775 "$PROJECT_DIR/bootstrap/cache" || true

            echo "======================================"
            echo "FINAL DEPLOYMENT CHECK"
            echo "======================================"

            if [ -f "$PUBLIC_DIR/index.php" ]; then
              echo "OK: index.php exists in public_html."
            else
              echo "ERROR: index.php missing in public_html."
              exit 1
            fi

            if [ -f "$PROJECT_DIR/.env" ]; then
              echo "OK: .env exists in Laravel project directory."
            else
              echo "ERROR: .env missing."
              exit 1
            fi

            echo "======================================"
            echo "DEPLOYMENT FINISHED SUCCESSFULLY"
            echo "======================================"
